<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>starglow_modoki</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="left-pane" aria-label="Image workspace">
        <header class="command-pane">
          <div class="brand">
            <div class="ae-mark">Ae</div>
            <h1>starglow_modoki</h1>
          </div>
          <div class="command-actions">
            <label class="button">
              <input id="fileInput" type="file" accept="image/*">
              Open
            </label>
            <button id="saveButton" type="button">Save PNG</button>
          </div>
        </header>

        <section id="previewPane" class="preview-pane" aria-label="Preview pane">
          <div id="viewport" class="viewport">
            <canvas id="previewCanvas" width="1280" height="820"></canvas>
            <div id="emptyState" class="empty-state">
              <strong>Drop an image</strong>
              <span>or use Open</span>
            </div>
          </div>
        </section>
      </section>

      <aside class="controls-pane" aria-label="Effect controls">
        <div class="top-control">
          <label class="field-row">
            <span>Preset</span>
            <select id="presetSelect"></select>
          </label>
        </div>
        <div id="controlsRoot" class="controls-root"></div>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
